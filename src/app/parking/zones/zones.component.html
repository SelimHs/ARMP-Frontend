<h2>Parking Zones</h2>

<div *ngFor="let zone of zones" style="border:1px solid #ccc; padding:12px; margin-bottom:10px;">
  <h3>{{ zone.name }}</h3>
  <p><strong>Location:</strong> {{ zone.location }}</p>
  <p><strong>Description:</strong> {{ zone.description }}</p>

  <button (click)="openSlots(zone.id_zone)">View Slots</button>
</div>

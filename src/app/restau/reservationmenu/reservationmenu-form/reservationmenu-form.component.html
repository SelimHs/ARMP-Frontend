<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-success text-white">
          <h3 class="mb-0">Nouvelle Réservation de Menu</h3>
        </div>
        <div class="card-body">
          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="reservationMenuForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Utilisateur</label>
              <input type="text" class="form-control" value="Ahmed Ben Ali (ID: 1)" readonly disabled>
              <small class="text-muted">Utilisateur connecté: Ahmed Ben Ali</small>
            </div>

            <div class="mb-3">
              <label class="form-label">Menu</label>
              <select class="form-select" formControlName="menuId">
                <option [ngValue]="null">Sélectionner un menu</option>
                <option *ngFor="let menu of menus" [ngValue]="menu.id_menu">
                  {{ menu.jour | titlecase }} - {{ menu.plat_principal }} ({{ menu.entree }})
                </option>
              </select>
              <div *ngIf="reservationMenuForm.get('menuId')?.invalid && reservationMenuForm.get('menuId')?.touched" class="text-danger">
                Le menu est requis
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Date de réservation</label>
              <input type="date" class="form-control" formControlName="date_reservation">
              <small class="text-muted" *ngIf="selectedDate">Date pré-sélectionnée: {{ selectedDate }}</small>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" formControlName="a_emporter">
              <label class="form-check-label">À emporter</label>
            </div>

            <div class="mb-3">
              <label class="form-label">Heure de récupération</label>
              <input type="time" class="form-control" formControlName="heure_recuperation">
              <small class="text-muted">Exemple: 12:30</small>
            </div>

            <button type="submit" class="btn btn-success" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              Créer la réservation
            </button>
            <button type="button" class="btn btn-secondary ms-2" routerLink="/reservationmenus">Annuler</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
